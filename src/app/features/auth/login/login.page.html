<main class="login-shell">
  <section class="login-card page-card" aria-labelledby="login-title">
    <header class="login-card__header">
      <p class="login-card__brand">GestionPro</p>
      <h1 id="login-title" class="login-card__title">Ingresa a tu cuenta para continuar</h1>
    </header>

    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="login-form__group">
        <label class="login-form__label" for="email">Email</label>
        <div class="login-form__field" [class.is-invalid]="isFieldInvalid('email')">
          <i class="pi pi-envelope login-form__icon" aria-hidden="true"></i>
          <input
            id="email"
            pInputText
            type="email"
            class="login-form__input"
            formControlName="email"
            placeholder="correo@empresa.com"
            autocomplete="email"
            [attr.aria-invalid]="isFieldInvalid('email')"
            aria-describedby="login-email-error"
          />
        </div>
        @if (getFieldError('email'); as error) {
          <small id="login-email-error" class="login-form__error">{{ error }}</small>
        }
      </div>

      <div class="login-form__group">
        <label class="login-form__label" for="password">Contraseña</label>
        <div class="login-form__field" [class.is-invalid]="isFieldInvalid('password')">
          <i class="pi pi-lock login-form__icon" aria-hidden="true"></i>
          <input
            id="password"
            pInputText
            [type]="isPasswordVisible() ? 'text' : 'password'"
            class="login-form__input"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
            [attr.aria-invalid]="isFieldInvalid('password')"
            aria-describedby="login-password-error"
          />
          <button
            type="button"
            class="login-form__toggle"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="isPasswordVisible() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <i class="pi" [class.pi-eye]="!isPasswordVisible()" [class.pi-eye-slash]="isPasswordVisible()" aria-hidden="true"></i>
          </button>
        </div>
        @if (getFieldError('password'); as error) {
          <small id="login-password-error" class="login-form__error">{{ error }}</small>
        }
      </div>

      @if (generalError(); as error) {
        <div class="login-form__alert" role="alert" aria-live="polite">
          <i class="pi pi-exclamation-circle"></i>
          <span>{{ error }}</span>
        </div>
      }

      <button pButton type="submit" class="login-form__submit" [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          <i class="pi pi-spin pi-spinner login-form__submit-icon" aria-hidden="true"></i>
        }
        <span>{{ isSubmitting() ? 'Entrando...' : 'Entrar' }}</span>
        @if (!isSubmitting()) {
          <i class="pi pi-arrow-right login-form__submit-icon" aria-hidden="true"></i>
        }
      </button>
    </form>

    <div class="login-card__divider" aria-hidden="true"></div>

    <p class="login-card__footer">
      ¿No tienes una cuenta?
      <a routerLink="/auth/register">Crear cuenta</a>
    </p>
  </section>
</main>
