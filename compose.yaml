services:
  angular:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lexco-angular
    command: sh -c "npm install && npm run start:docker"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NG_CLI_ANALYTICS: "false"
      NODE_ENV: development
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
